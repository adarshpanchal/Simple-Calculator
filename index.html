<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="head">Calculator</h1>

    <div class="box">
        <div class="display"></div>
        <div class="row">
            <div class="num num1">1</div>
            <div class="num num2">2</div>
            <div class="num num3">3</div>
            <div class="num plus">+</div>
        </div>
        <div class="row">
            <div class="num num4">4</div>
            <div class="num num5">5</div>
            <div class="num num6">6</div>
            <div class="num minus">-</div>
        </div>
        <div class="row">
            <div class="num num7">7</div>
            <div class="num num8">8</div>
            <div class="num num9">9</div>
            <div class="num multi">*</div>
        </div>
        <div class="row">
            <div class="num cross">⌫</div>
            <div class="num num0">0</div>
            <div class="num equal">=</div>
            <div class="num divide">/</div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
